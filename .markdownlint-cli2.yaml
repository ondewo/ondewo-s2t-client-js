# Auto-fix the mechanical rules (blank-line spacing, list indentation, emphasis
# style, ...) the same way ruff-format does for Python.
fix: true
config:
  # MD013 line-length: docs contain long lines / tables.
  MD013: false
  # MD033 no-inline-html: docs embed <p>/<code> HTML tags.
  MD033: false
  # MD024 duplicate-heading: the release-automation changelog repeats
  # "### Improvements" under every release section AND contains genuine historical
  # duplicate sibling version headings (e.g. two "Release ... 7.2.0" / "... 3.3.0"
  # entries) that must NOT be rewritten (release history + Makefile note-extraction
  # grep depend on the exact heading text). Disable rather than mangle history.
  MD024: false
  # MD040 fenced-code-language: README embeds plain directory-tree / output blocks.
  MD040: false
  # MD041 first-line-heading: README opens with the HTML branding/logo header.
  MD041: false
  # MD045 image-alt-text: the branding header uses <img> logos / social icons.
  MD045: false
  # MD053 link-reference-definitions: the READMEs use `[comment]: <> (...)` HTML-
  # comment markers (START/END OF GITHUB README) that the release tooling relies on.
  # markdownlint treats them as "unused" link references and its --fix DELETES them
  # (and, via an applyFix bug, corrupts adjacent list items). Keep them.
  MD053: false
globs:
  - "*.md"
ignores:
  - "node_modules/**"
  - "api/**"
  - "src/ondewo-s2t-api/**"
  - "ondewo-proto-compiler/**"
  - "lib/**"
  - "dist/**"
  - "build/**"
  - ".venv/**"
